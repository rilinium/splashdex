name: Fetch Weekly Sets

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch sets.txt from nimblebit.com
        run: curl -fsSL -o sets.txt https://www.nimblebit.com/sets.txt

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sets.txt
          git diff --staged --quiet || git commit -m "chore: update sets.txt [skip ci]"
          git push
